name: CI

on:
  push:
    paths-ignore: &ci_ignore_paths
      - "assets/**"
      # Editor configs
      - ".zed/**"
      - ".vscode/**"
      # Docs
      - "docs/**"
      # README.md is deliberately not ignored because it is included in TypeDoc.
      # Formatters
      - "eslint.config.mjs"
      - "prettier.config.js"
      - ".editorconfig"
  pull_request:
    paths-ignore:
      - "assets/**"
      - ".zed/**"
      - ".vscode/**"
      - "docs/**"
      - "eslint.config.mjs"
      - "prettier.config.js"
      - ".editorconfig"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-check:
    name: Check Version
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      npm_version_changed: ${{ steps.check.outputs.npm_version_changed }}
      new_version: ${{ steps.check.outputs.new_version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check the version
        id: check
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "Current version: $CURRENT_VERSION"
          PKG_NAME=$(jq -r .name package.json)
          echo "new_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          TAG_STATUS=0
          git ls-remote --exit-code --tags origin "refs/tags/v$CURRENT_VERSION" >/dev/null 2>&1 || TAG_STATUS=$?
          case "$TAG_STATUS" in
            0)
              echo "Release tag v$CURRENT_VERSION already exists"
              echo "version_changed=false" >> "$GITHUB_OUTPUT"
              ;;
            2)
              echo "Release tag v$CURRENT_VERSION is new"
              echo "version_changed=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Failed to query release tags (git ls-remote exited $TAG_STATUS)" >&2
              exit "$TAG_STATUS"
              ;;
          esac

          NPM_STATUS=0
          NPM_OUTPUT=$(npm view "$PKG_NAME@$CURRENT_VERSION" version 2>&1) || NPM_STATUS=$?
          if [ "$NPM_STATUS" -eq 0 ]; then
            echo "$PKG_NAME@$CURRENT_VERSION is already published"
            echo "npm_version_changed=false" >> "$GITHUB_OUTPUT"
          elif grep -qE 'E404|404 Not Found' <<< "$NPM_OUTPUT"; then
            echo "$PKG_NAME@$CURRENT_VERSION is not published"
            echo "npm_version_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "$NPM_OUTPUT" >&2
            exit "$NPM_STATUS"
          fi

  build:
    name: Build Sherpa
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache rewriter build artifacts
        uses: actions/cache@v4
        id: rewriter-cache
        with:
          path: |
            rewriter/wasm/out
            dist/sherpa.wasm.wasm
          key: rewriter-release-${{ hashFiles('rewriter/Cargo.lock', 'rewriter/**/*.toml', 'rewriter/**/*.rs', 'rewriter/wasm/build.sh') }}
          restore-keys: |
            rewriter-release-

      - name: Cache Rust dependencies
        if: steps.rewriter-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rewriter"

      - name: Install wbg
        if: steps.rewriter-cache.outputs.cache-hit != 'true'
        uses: jetli/wasm-bindgen-action@v0.2.0
        with:
          version: "0.2.100"

      - name: Setup Binaryen
        if: steps.rewriter-cache.outputs.cache-hit != 'true'
        uses: Aandreba/setup-binaryen@v1.0.0
        with:
          token: ${{ github.token }}

      - name: Setup wasm-snip
        if: steps.rewriter-cache.outputs.cache-hit != 'true'
        run: "cargo install --git https://github.com/r58playz/wasm-snip"

      - name: Pack Sherpa
        run: pnpm pack

      - name: Upload Artifact (pnpm pack)
        uses: actions/upload-artifact@v4
        with:
          name: packaged-sherpa
          # the package is named plain "sherpa" (no npm scope), so pnpm pack
          # emits sherpa-<version>.tgz; the old upstream-scoped glob matched
          # nothing and the artifact was silently never uploaded
          path: sherpa-*.tgz
          if-no-files-found: error

      - name: Upload Artifact (dist)
        uses: actions/upload-artifact@v4
        with:
          name: sherpa
          path: |
            dist/*.js
            dist/*.js.map
            dist/*.wasm

  package-validation:
    name: Validate Package Structure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run lint
        run: pnpm lint

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-sherpa
          path: .

      - name: Extract package
        run: tar xvf sherpa-*.tgz package --strip-components=1

      - name: Run package validation tests
        run: pnpm test:package
  tests:
    name: Run Sherpa Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, package-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: sherpa
          path: dist

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: pnpm test:integration

      - name: Upload Playwright diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diagnostics
          path: test-results
          if-no-files-found: ignore

  rewritertests:
    name: "Run Rewriter Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [build, package-validation]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache rewriter build artifacts
        uses: actions/cache@v4
        id: rewriter-cache
        with:
          path: |
            rewriter/wasm/out
            dist/sherpa.wasm.wasm
          key: rewriter-release-${{ hashFiles('rewriter/Cargo.lock', 'rewriter/**/*.toml', 'rewriter/**/*.rs', 'rewriter/wasm/build.sh') }}
          restore-keys: |
            rewriter-release-

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rewriter"

      - name: Run Tests
        run: cd rewriter/native && cargo test

  upload:
    name: Upload release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [version-check, build, package-validation, rewritertests, tests]
    permissions:
      actions: read
      contents: write
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Delete old release and tag
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          delete_release: true
          tag_name: latest
          github_token: ${{ github.token }}

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-sherpa
          path: .

      - name: Release unstable build to GitHub
        uses: ncipollo/release-action@v1
        with:
          name: Continuous Build
          tag: latest
          commit: main
          body: "${{ github.event.head_commit.url }} ${{ github.event.head_commit.message }}"
          artifacts: "sherpa-*.tgz"
          prerelease: true

      - name: Release tagged version to GitHub
        if: needs.version-check.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: "${{ needs.version-check.outputs.new_version }}"
          tag: "v${{ needs.version-check.outputs.new_version }}"
          commit: main
          body: "${{ github.event.head_commit.url }} ${{ github.event.head_commit.message }}"
          artifacts: "sherpa-*.tgz"

  publish:
    name: Publish Sherpa to NPM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [version-check, build, package-validation]
    permissions:
      actions: read
      contents: read
      id-token: write
    # Publishing is opt-in (repo variable ENABLE_NPM_PUBLISH=true): the
    # unscoped npm name "sherpa" is already owned by an unrelated package, so
    # publishing under the current package.json name can never succeed and
    # was failing every main push. Pick a publishable name/scope first - see
    # KNOWN_ISSUES.md.
    if: ${{ (vars.ENABLE_NPM_PUBLISH == 'true') && (needs.version-check.outputs.npm_version_changed == 'true') && (github.ref == 'refs/heads/main') }}

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: packaged-sherpa
          path: .

      - name: Update npm
        run: npm install -g npm@latest

      - name: Publish
        run: npm publish sherpa-${{ needs.version-check.outputs.new_version }}.tgz --access public --no-git-checks

  pages:
    name: Upload to Github Pages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, package-validation, rewritertests, tests]
    permissions:
      actions: read
      contents: read
      id-token: write
      pages: write
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Get artifacts
        uses: actions/download-artifact@v4
        with:
          name: sherpa
          path: dist

      - name: Download existing TypeDoc history
        run: bash ./ci/download-existing-docs.sh
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build TypeDoc documentation with versioning
        continue-on-error: true
        run: bash ./ci/build-docs.sh

      - name: Upload TypeDoc user-facing artifact
        uses: actions/upload-artifact@v4
        with:
          name: typedoc-current
          path: typedoc-*.tar.gz

      - name: Upload TypeDoc dev-facing artifact
        uses: actions/upload-artifact@v4
        with:
          name: typedoc-current-dev
          path: typedoc-*.tar.gz-dev

      - name: Build static assets
        run: bash ./ci/build-static.sh

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./staticbuild"

      - name: Deploy to github
        id: deployment
        uses: actions/deploy-pages@v4
